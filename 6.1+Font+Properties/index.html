<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Properties</title>
  <style>
    html{
      font-size: 30px;
    }

    body {
      background-color: cornflowerblue;
      color: white;
      font-size: 18px;
    }

    /* Don't change the CSS above, add Your CSS below */
    .note {
      color: coral;
    }

    .book{
      font-size: 32px;
    }

    .font{
      font-weight: 900;
    }

    .good{
      font-family: 'caveat' , cursive;
      font-weight: 400;
    }

    .ball{
      text-align: right;
    }

  </style>
</head>

<body>
  <h1>Important CSS Properties</h1>
  <p class="note">Color</p>
  <p class="book">Font Size</p>
  <p class="font">Font Weight</p>
  <p class="good">Font Family</p>
  <p class="ball">Text Align</p>

</html>
